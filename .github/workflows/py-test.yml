---
name: "Python testing"

on:
  push:
    branches:
  pull_request:

jobs:
  tests:
    name: "Test package (${{ matrix.install-profile }})"
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 3
      matrix:
        python-version: ['3.12']
        install-profile: ['core', 'apparent-temperature']
    steps:
      - name: "Checkout code"
        uses: actions/checkout@v3

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: "Cache pip"
        uses: actions/cache@v3
        with:
          # This path is specific to Ubuntu
          path: ~/.cache/pip
          # Look to see if there is a cache hit for the corresponding requirements file
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
            ${{ runner.os }}-

      - name: "Install dependencies"
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requires.txt
          pip install pytest-xdist

      - name: "Install optional apparent temperature dependencies"
        if: matrix.install-profile == 'apparent-temperature'
        run: |
          sudo apt-get update
          sudo apt-get install -y libeccodes0 libeccodes-dev
          python -m pip install "./[apparent-temperature]"

      - name: "Run tests with unittest"
        run: |
          python -m unittest discover -q -f tests
